openapi: 3.1.0
info:
  title: Sample REST API
  version: 0.2.0
  description: Sample REST API with JWT authentication.
servers:
  - url: /
paths:
  /api/login:
    post:
      summary: Get JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /api/me:
    get:
      summary: Authenticated user info
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          description: Missing/invalid token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /docs/openapi.yaml:
    get:
      summary: Download OpenAPI specification
      operationId: getOpenApiSpec
      responses:
        '200':
          description: OpenAPI YAML file
          content:
            application/yaml:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: demo
        password:
          type: string
          example: demo
    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
    Me:
      type: object
      required: [user, roles]
      properties:
        user:
          type: string
          example: demo
        roles:
          type: array
          items:
            type: string
            example: ROLE_USER
    Health:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          example: urn:sample02:error:invalid-credentials
        title:
          type: string
          example: Invalid credentials
        status:
          type: integer
          example: 401
        detail:
          type: string
