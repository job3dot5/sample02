openapi: 3.1.0
info:
  title: Sample REST API
  version: 1.0.0
  description: Sample REST API v1 with JWT authentication and message queue.
servers:
  - url: /
paths:
  /api/v1/login:
    post:
      summary: Get JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /api/v1/me:
    get:
      summary: Authenticated user info
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          description: Missing/invalid token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/v1/images:
    get:
      summary: List images (paginated or filtered by id/ids)
      operationId: listImages
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: false
          schema:
            type: integer
            minimum: 1
          description: Return only one image by id. Mutually exclusive with ids.
        - in: query
          name: ids
          required: false
          schema:
            type: string
            example: 1,2,5
          description: Return only images in this comma-separated id list. Mutually exclusive with id.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Used only when id/ids filters are not provided.
        - in: query
          name: per_page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Used only when id/ids filters are not provided.
      responses:
        '200':
          description: Paginated list of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '400':
          description: Invalid pagination parameters
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Missing/invalid token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      summary: Upload image and queue processing
      operationId: uploadImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Image accepted and queued for asynchronous processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageUploadQueuedResponse'
        '400':
          description: Invalid upload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Missing/invalid token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '413':
          description: Uploaded image too large
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Image queueing failure
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/v1/image-jobs/{job_id}:
    get:
      summary: Poll image job status
      operationId: getImageJobStatus
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
      responses:
        '200':
          description: Current image job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageJobStatus'
        '401':
          description: Missing/invalid token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Image job not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/v1/image/{id}:
    get:
      summary: Render image binary by id
      operationId: renderImage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: variant
          required: false
          schema:
            type: string
            enum: [original, thumbnail, resized]
            default: original
      responses:
        '200':
          description: Image binary stream
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid variant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Missing/invalid token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Image or file not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /docs/openapi.v1.yaml:
    get:
      summary: Download OpenAPI specification
      operationId: getOpenApiSpec
      responses:
        '200':
          description: OpenAPI YAML file
          content:
            application/yaml:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: demo
        password:
          type: string
          example: demo
    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
    Me:
      type: object
      required: [user, roles]
      properties:
        user:
          type: string
          example: demo
        roles:
          type: array
          items:
            type: string
            example: ROLE_USER
    Health:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: api
    ImageUploadQueuedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ImageUploadQueued'
    ImageUploadQueued:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
          example: 2cf8bd7572819cdb2288f72389f96a53
        status:
          type: string
          example: queued
    Image:
      type: object
      properties:
        id:
          type: integer
          example: 1
        original_filename:
          type: string
        mime_type:
          type: string
          example: image/jpeg
        size_bytes:
          type: integer
          example: 123456
        width:
          type: integer
          example: 1920
        height:
          type: integer
          example: 1080
        orientation:
          type: string
          enum: [landscape, portrait, square]
        image_urls:
          type: object
          required: [original, thumbnail, resized]
          properties:
            original:
              type: string
              example: /api/v1/image/1?variant=original
            thumbnail:
              type: string
              example: /api/v1/image/1?variant=thumbnail
            resized:
              type: string
              example: /api/v1/image/1?variant=resized
        analysis:
          type: object
          required: [status, result, cost]
          properties:
            status:
              type: string
              nullable: true
              example: completed
            result:
              type: object
              nullable: true
              additionalProperties: true
            cost:
              type: object
              nullable: true
              required: [model, input_tokens, output_tokens, total_tokens, estimated_cost]
              properties:
                model:
                  type: string
                  example: gpt-4.1-nano
                input_tokens:
                  type: integer
                  example: 1200
                output_tokens:
                  type: integer
                  example: 400
                total_tokens:
                  type: integer
                  example: 1600
                estimated_cost:
                  type: number
                  format: float
                  example: 0.0008
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ImageJobStatus:
      type: object
      required: [status, image_id, error]
      properties:
        status:
          type: string
          enum: [queued, processing, completed, failed]
          example: processing
        image_id:
          type: integer
          nullable: true
          example: 12
        error:
          type: string
          nullable: true
          example: Unable to persist image metadata row.
    ImageListMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        total_pages:
          type: integer
          example: 3
    ImageListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        meta:
          $ref: '#/components/schemas/ImageListMeta'
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          example: urn:sample02:error:invalid-credentials
        title:
          type: string
          example: Invalid credentials
        status:
          type: integer
          example: 401
        detail:
          type: string
