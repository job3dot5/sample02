security:
    password_hashers:
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext

    providers:
        app_users:
            id: App\Security\ApiUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: '^%app.api_prefix%'
            stateless: true
            provider: app_users
            jwt: ~

    access_control:
        - { path: '^%app.api_prefix%/login', roles: PUBLIC_ACCESS }
        - { path: '^%app.api_prefix%/health', roles: PUBLIC_ACCESS }
        - { path: ^/docs/openapi\.v1\.yaml$, roles: PUBLIC_ACCESS }
        - { path: '^%app.api_prefix%', roles: IS_AUTHENTICATED_FULLY }
